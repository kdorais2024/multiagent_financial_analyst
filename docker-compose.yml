version: "3.9"

services:
  financial-research:
    build: .
    container_name: financial-research-assistant
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
